name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint with ruff
        run: uv run ruff check skyshield benchmarks tests

      - name: Type check with mypy
        run: uv run mypy skyshield --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        run: uv run pytest skyshield tests --tb=short --maxfail=10

      - name: Run benchmark smoke tests
        run: uv run python -m benchmarks.bench_propagate --smoke
        continue-on-error: true
